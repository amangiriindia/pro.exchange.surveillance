name: surveillance
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+10

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  window_manager: ^0.5.1
  flutter_screenutil: ^5.9.3
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  dartz: ^0.10.1
  equatable: ^2.0.8
  intl: ^0.20.2
  flutter_svg: ^2.2.4
  excel: ^4.0.6
  open_filex: ^4.7.0
  pdf: ^3.12.0
  printing: ^5.14.3
  file_picker: ^11.0.2
  socket_io_client: ^3.1.4
  web_socket_channel: ^3.0.3
  geolocation_ip: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/bazaar_logo.png
    - assets/images/excel.png
    - assets/images/login_bg.png
    - assets/images/pdf.png
    - assets/images/sort.svg

# Configuration for flutter_launcher_icons (at root level, NOT under flutter:)
flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: "assets/images/bazaar_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/bazaar_logo.png"